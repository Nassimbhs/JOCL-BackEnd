spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jocldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jocl.app.jwtSecret=${JOCL_APP_JWTSECRET:jwtSecret}
jocl.app.jwtExpirationMs=${JOCL_APP_JWTEXPIRATIONMS:86400000}